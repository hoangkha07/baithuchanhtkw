<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/style7.css">


</head>

<body>

<div class="container">

    <div class="row align-items-center">

        <div class="col-md-5">
            <img id="img" src="" alt="Sản phẩm">
        </div>

        <div class="thumb-list mt-3">
            <img src = "../assets/img/2-cach-lam-mi-cay-han-quoc-tai-nha-ngon-nhu-ngoai-hang-m--n-m---cay-h---i-s---n-1596697335-152-width600height489.jpg" onclick ="changeImg(this)">
            <img src = "../assets/img/2-cach-lam-mi-cay-han-quoc-tai-nha-ngon-nhu-ngoai-hang-m--n-m---cay-h---i-s---n-1596697335-152-width600height489.jpg" onclick ="changeImg(this)">
            <img src = "../assets/img/2-cach-lam-mi-cay-han-quoc-tai-nha-ngon-nhu-ngoai-hang-m--n-m---cay-h---i-s---n-1596697335-152-width600height489.jpg" onclick ="changeImg(this)">
        </div>

        <div class="col-md-7">

            <h2 id="name"></h2>

            <h4 id="price" class="text-danger"></h4>

            <p id="desc"></p>
 <p>
     Tham khảo:
    <a id="product-link" target="_blank">
     Link sản phẩm
    </a>
</p>
        </div>

    </div>

    <hr>

   <div class="row" id="related-products"></div>

    <script src="../js/lib.js"></script>

<script>

const urlParams = new URLSearchParams(window.location.search);

const productId = parseInt(urlParams.get("ma"));

const foundProduct = productId 
    ? products.find(item => item.id === productId)
    : products[0];

if(foundProduct){

    document.getElementById("name").innerHTML =
        foundProduct.name;

    document.getElementById("price").innerHTML =
        foundProduct.price.toLocaleString() + " VNĐ";

    document.getElementById("desc").innerHTML =
        foundProduct.description;

    document.getElementById("img").src =
        foundProduct.image;

   document.getElementById("product-link").href =
    foundProduct.link;

    const relatedProducts =
document.getElementById("related-products");

products.forEach(item => {

    if(
        item.category === foundProduct.category &&
        item.id !== foundProduct.id
    ){

        relatedProducts.innerHTML += `

        <div class="col-lg-4 col-md-6 mb-3">

            <div class="card h-100">

                <img src="${item.image}"
                     class="card-img-top">

                <div class="card-body">

                    <h5>${item.name}</h5>

                    <p class="text-danger fw-bold">
                        ${item.price.toLocaleString()} VNĐ
                    </p>

                    <a href="chi-tiet.html?ma=${item.id}"
                       class="btn btn-primary">
                       Xem chi tiết
                    </a>

                </div>

            </div>

        </div>

        `;
    }

});
}

function changeImg(el)
{
    document.getElementById("img").src = el.src;
}

</script>

</body>
</html>
