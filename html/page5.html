<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nhập và hiển thị</title>
</head>
<body>
    <script>
        let name = prompt("Hãy nhập vào tên của bạn:");
        let yob = Number (prompt("Hãy nhập vào năm sinh của bạn:" ));
        alert("Chào bạn "+ name + ", năm nay bạn đã "+ (2026 - yob)+ " tuổi rồi đó !")
    </script>
</body>
</html>
